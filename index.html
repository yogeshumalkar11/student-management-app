<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management App</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <h1>Student Management - Change1</h1>

        <section class="form-section">
            <h2>Add Student</h2>
            <form id="studentForm">
                <div class="form-group">
                    <label for="studentName">Name</label>
                    <input type="text" id="studentName" placeholder="Enter student name" required />
                </div>
                <div class="form-group">
                    <label for="studentAge">Age</label>
                    <input type="number" id="studentAge" placeholder="Enter age" min="1" max="100" required />
                </div>
                <div class="form-group">
                    <label for="studentGrade">Grade</label>
                    <input type="text" id="studentGrade" placeholder="e.g. 10th, A, B+" required />
                </div>
                <div class="form-group">
                    <label for="studentEmail">Email</label>
                    <input type="email" id="studentEmail" placeholder="Enter email" required />
                </div>
                <button type="submit" class="btn btn-primary">Add Student</button>
            </form>
            <p id="formMessage" class="form-message"></p>
        </section>

        <section class="list-section">
            <div class="list-header">
                <h2>Student List</h2>
                <span id="studentCount" class="badge">0 students</span>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by name, grade, or roll number..." />
            </div>
            <div id="studentList" class="student-grid"></div>
            <p id="emptyMessage" class="empty-message">No students added yet.</p>
        </section>
    </div>

    <script src="app.js"></script>
</body>

</html>
